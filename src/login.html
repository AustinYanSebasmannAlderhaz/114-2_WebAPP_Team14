<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ninjago Archive</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .auth-wrap {
            min-height: calc(100vh - 200px);
            display: grid;
            place-items: center;
            padding: 40px 16px;
        }

        .auth-card {
            width: min(480px, 100%);
            background: #1b1b1b;
            border: 1px solid #333;
            border-left: 4px solid #e62429;
            border-radius: 12px;
            padding: 24px 20px;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
        }

        .auth-card h1 {
            margin: 0 0 16px;
            font-size: 30px;
        }

        .auth-note {
            margin: 0 0 16px;
            color: #c7c7c7;
            line-height: 1.6;
        }

        .auth-errors {
            margin: 0 0 16px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 98, 98, 0.5);
            background: rgba(130, 23, 23, 0.35);
            color: #ffd7d7;
            font-size: 14px;
            line-height: 1.6;
        }

        .auth-field {
            margin-bottom: 14px;
        }

        .auth-field label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .auth-field input {
            width: 100%;
            border: 1px solid #3d3d3d;
            border-radius: 8px;
            background: #111;
            color: #f2f2f2;
            padding: 10px 12px;
            font-size: 15px;
        }

        .auth-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 8px;
        }

        .auth-btn {
            border: 0;
            border-radius: 8px;
            background: #e62429;
            color: #fff;
            padding: 10px 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .auth-btn.secondary {
            background: #2b2b2b;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><img src="/img/lego-ninjago-logo.png" alt="Ninjago Archive Logo" height="80"></div>
            <ul class="nav-links">
                <li><a href="/index.html">首頁</a></li>
                <li><a href="/src/timeline.html">時間線</a></li>
                <li><a href="/src/world.html">世界觀</a></li>
                <li><a href="/characters/">角色</a></li>
                <li><a href="/src/elements.html">元素力量</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-wrap">
        <section class="auth-card">
            <h1>Member Login</h1>

            {% if request.user.is_authenticated %}
                <p class="auth-note">你目前已登入：{{ request.user.username }}</p>
                <form method="post" action="/logout/">
                    {% csrf_token %}
                    <button class="auth-btn secondary" type="submit">登出</button>
                </form>
            {% else %}
                <p class="auth-note">請先登入</p>

                {% if form.errors %}
                    <div class="auth-errors">
                        帳號或密碼錯誤，請再試一次。
                    </div>
                {% endif %}

                <form method="post" action="/login/">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">

                    <div class="auth-field">
                        <label for="id_username">Username</label>
                        {{ form.username }}
                    </div>

                    <div class="auth-field">
                        <label for="id_password">Password</label>
                        {{ form.password }}
                    </div>

                    <div class="auth-actions">
                        <button class="auth-btn" type="submit">登入</button>
                        <a class="auth-btn secondary" href="/register/" style="text-decoration:none;">前往註冊</a>
                        <a class="auth-btn secondary" href="/index.html" style="text-decoration:none;">回首頁</a>
                    </div>
                </form>
            {% endif %}
        </section>
    </main>
</body>
</html>
